; XTEink X4 bike HUD
; ESP32-C3 · 16MB flash · no PSRAM
;
; Build:  pio run
; Flash:  pio run -t upload
; Serial: pio device monitor

[env:x4]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000

board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.f_cpu = 160000000L

lib_deps =
  zinggjm/GxEPD2@^1.6.0
  ; 2.x required for Arduino-ESP32 3.x / IDF 5 (1.4 crashes in controller init)
  h2zero/NimBLE-Arduino@^2.5.0

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCORE_DEBUG_LEVEL=1
  -DBIKE_HUD_FW=1
  ; Force C++ packing expectations for protocol header
  -I../protocol
  -Iinclude

monitor_filters = esp32_exception_decoder

; Demo mode: ignore BLE and cycle fake numbers (desk, no phone)
; pio run -e x4_demo
[env:x4_demo]
extends = env:x4
build_flags =
  ${env:x4.build_flags}
  -DBIKE_HUD_DEMO=1
